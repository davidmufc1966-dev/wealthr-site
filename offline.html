<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offline — Wealthr</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070e;color:#f0f0f0;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.icon{font-size:64px;margin-bottom:24px}
h1{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;letter-spacing:-.02em;margin-bottom:12px}
h1 em{font-style:italic;color:#4d9fff}
p{color:#555;font-size:12px;margin-bottom:32px;line-height:1.8}
a{display:inline-block;background:#4d9fff;color:#000;padding:12px 28px;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none;letter-spacing:.05em}
</style>
</head>
<body>
<div>
  <div class="icon">📡</div>
  <h1>You're <em>offline</em></h1>
  <p>No internet connection detected.<br>Your Wealthr data is still safe on your device.<br>Reconnect to refresh live prices and news.</p>
  <a href="/app">Open App →</a>
</div>
</body>
</html>
